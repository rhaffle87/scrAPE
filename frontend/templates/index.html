<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRAPE // WATCHDOG</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0d0c;
            --bg-surface: #161917;
            --accent: #ff5500;
            --accent-dim: rgba(255, 85, 0, 0.2);
            --text-primary: #f4f4f0;
            --text-muted: #8c928e;
            --border-heavy: 2px solid #3a3f3c;
            --border-accent: 2px solid var(--accent);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0 !important;
            /* Brutalism: no curves */
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            position: relative;
            min-height: 100vh;
        }

        /* SVG Noise Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        header {
            background-color: var(--bg-base);
            padding: 2rem;
            border-bottom: var(--border-heavy);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            line-height: 1;
        }

        .header-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stat-card {
            background-color: var(--bg-surface);
            padding: 1.5rem;
            border: var(--border-heavy);
            display: flex;
            flex-direction: column;
            transition: all 0s;
            /* No smooth transitions */
            position: relative;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            opacity: 0;
        }

        .stat-card:hover {
            border-color: var(--accent);
            background-color: var(--accent-dim);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .stat-card .value {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 2rem;
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            border-bottom: var(--border-heavy);
        }

        .tab {
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem 2rem;
            background-color: transparent;
            border: none;
            border-right: var(--border-heavy);
            border-top: var(--border-heavy);
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .tab:first-child {
            border-left: var(--border-heavy);
        }

        .tab:hover {
            color: var(--text-primary);
            background-color: var(--bg-surface);
        }

        .tab.active {
            background-color: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .gallery-container {
            padding: 0 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-container h2 {
            font-family: 'Oswald', sans-serif;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .media-card {
            background-color: var(--bg-surface);
            position: relative;
            aspect-ratio: 1;
            border: var(--border-heavy);
            overflow: hidden;
        }

        .media-card:hover {
            border-color: var(--accent);
        }

        .media-card img,
        .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0s;
        }

        .media-card:hover img,
        .media-card:hover video {
            filter: grayscale(0%) contrast(1);
        }

        .media-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--accent);
            padding: 0.5rem;
            font-size: 0.75rem;
            color: var(--bg-base);
            font-weight: 700;
            opacity: 0;
        }

        .media-card:hover .overlay {
            opacity: 1;
        }

        /* Control Panel Styles */
        .control-panel {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            border-bottom: var(--border-heavy);
            display: none;
            /* Hidden by default */
        }

        .control-panel-inner {
            background-color: var(--bg-surface);
            border: var(--border-accent);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Live Terminal Styles */
        .live-terminal-wrapper {
            margin-top: 2rem;
            border: var(--border-heavy);
            background-color: var(--bg-base);
            display: none;
            flex-direction: column;
        }

        .live-terminal-header {
            background-color: var(--accent);
            color: var(--bg-base);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .live-terminal-body {
            height: 300px;
            overflow-y: auto;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .control-panel h2 {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .control-panel label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .control-panel input {
            background-color: var(--bg-base);
            border: var(--border-heavy);
            color: var(--text-primary);
            padding: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            width: 100%;
        }

        .control-panel input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-run {
            background-color: var(--accent);
            color: var(--bg-base);
            border: none;
            padding: 1rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0s;
            height: 100%;
        }

        .btn-run:hover {
            background-color: var(--text-primary);
        }

        .btn-run:disabled {
            background-color: var(--bg-base);
            color: var(--text-muted);
            border: var(--border-heavy);
            cursor: not-allowed;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background-color: var(--bg-base);
            border: var(--border-heavy);
            color: var(--text-muted);
            margin-left: 1rem;
            vertical-align: middle;
        }
        
        .btn-kill {
            background-color: transparent;
            color: red;
            border: 2px solid red;
            padding: 1rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.2s;
            height: 100%;
        }
        
        .btn-kill:hover {
            background-color: red;
            color: white;
        }

        .status-badge.running {
            border-color: var(--accent);
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>scrAPE // WATCHDOG</h1>
            <div class="header-sub">Data Extraction Engine</div>
        </div>
        <div id="sys-stats" hx-get="/htmx/stats" hx-trigger="load, every 2s"></div>
    </header>

    <div class="control-panel" id="control-panel">
        <div class="control-panel-inner">
            <div>
                <h2>LOCAL COMMAND CENTER <span class="status-badge" id="status-badge">STATUS: IDLE</span></h2>
            </div>
            <form id="scrape-form" class="form-row" hx-post="/htmx/run" hx-target="#status-badge">
                <div class="form-group">
                    <label>Keyword Target</label>
                    <input type="text" name="keyword" placeholder="e.g. apple" required>
                </div>
                <div class="form-group">
                    <label>Max Results</label>
                    <input type="number" name="max_results" value="50" required>
                </div>
                <div class="form-group">
                    <label>Crawl Depth</label>
                    <input type="number" name="crawl_depth" value="2" required>
                </div>
                <div class="form-group"
                    style="flex-direction: row; align-items: center; gap: 0.5rem; justify-content: flex-start; margin-top: auto; margin-bottom: 0.5rem;">
                    <input type="checkbox" name="download_media" id="arg-download-media" style="width: auto;" checked>
                    <label for="arg-download-media" style="margin: 0; cursor: pointer;">Download Media</label>
                </div>
                <div class="form-group" style="justify-content: flex-end; flex-direction: row; gap: 1rem;">
                    <button type="submit" class="btn-run" id="btn-run" onclick="document.getElementById('live-terminal-wrapper').style.display='flex'; setInterval(pollLogs, 1000);">[INITIATE_SCRAPE]</button>
                    <button type="button" class="btn-kill" hx-post="/htmx/kill" hx-target="#status-badge">[ABORT]</button>
                </div>
            </form>

            <div class="live-terminal-wrapper" id="live-terminal-wrapper">
                <div class="live-terminal-header">LIVE TERMINAL FEED</div>
                <div class="live-terminal-body" id="live-terminal-body"></div>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="label">EXTRACT.RUNS</div>
            <div class="value" id="total-runs">0</div>
        </div>
        <div class="stat-card">
            <div class="label">ASSET.IMG</div>
            <div class="value" id="total-images">0</div>
        </div>
        <div class="stat-card">
            <div class="label">ASSET.VID</div>
            <div class="value" id="total-videos">0</div>
        </div>
        <div class="stat-card">
            <div class="label">TARGETS.SCAN</div>
            <div class="value" id="total-scanned">0</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('images', this)">IMG_LOG</button>
        <button class="tab" onclick="showTab('videos', this)">VID_LOG</button>
    </div>

    <div class="gallery-container" id="images-tab">
        <h2>[ ACQUIRED IMAGES ]</h2>
        <div class="grid">
        </div>
    </div>

    <div class="gallery-container" id="videos-tab" style="display: none;">
        <h2>[ ACQUIRED VIDEOS ]</h2>
        <div class="grid">
        </div>
    </div>

    <script>
        function showTab(tabName, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.gallery-container').forEach(c => c.style.display = 'none');

            document.getElementById(tabName + '-tab').style.display = 'block';
            btn.classList.add('active');
        }

        // Setup Control Panel functionality if on local network
        document.addEventListener('DOMContentLoaded', () => {
            const hostname = window.location.hostname;
            if (hostname === 'localhost' || hostname === 'localhost') {
                document.getElementById('control-panel').style.display = 'block';

                // Start polling status
                setInterval(pollStatus, 2000);
                pollStatus(); // Initial check
            }
        });

        const btnRun = document.getElementById('btn-run');
        const statusBadge = document.getElementById('status-badge');

        let logOffset = 0;
        const terminalWrapper = document.getElementById('live-terminal-wrapper');
        const terminalBody = document.getElementById('live-terminal-body');

        // Dashboard Auto-Refresh State
        let lastImageCount = 0;
        let lastVideoCount = 0;
        let lastRunCount = 0;

        async function fetchDashboard() {
            try {
                const res = await fetch('/api/dashboard');
                if (!res.ok) return;
                const data = await res.json();

                // Update stats
                document.getElementById('last-updated').innerText = new Date().toLocaleTimeString();
                document.getElementById('total-runs').innerText = data.total_runs;
                document.getElementById('total-images').innerText = data.total_images;
                document.getElementById('total-videos').innerText = data.total_videos;
                document.getElementById('total-scanned').innerText = data.total_scanned_pages;

                // Only re-render gallery if numbers changed to avoid flickering
                if (data.total_runs !== lastRunCount || data.total_images !== lastImageCount || data.total_videos !== lastVideoCount) {
                    lastRunCount = data.total_runs;
                    lastImageCount = data.total_images;
                    lastVideoCount = data.total_videos;
                    renderGallery('images-tab', data.images, false);
                    renderGallery('videos-tab', data.videos, true);
                }
            } catch (err) {
                console.error("Dashboard fetch failed:", err);
            }
        }

        function renderGallery(tabId, items, isVideo) {
            const grid = document.querySelector('#' + tabId + ' .grid');
            grid.innerHTML = '';
            if (items.length === 0) {
                grid.innerHTML = '<p>No items found.</p>';
                return;
            }
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'media-card';
                if (isVideo) {
                    card.innerHTML = `<video src="${item}" controls preload="metadata" muted></video><div class="overlay">${item}</div>`;
                } else {
                    card.innerHTML = `<img src="${item}" loading="lazy" alt="Scraped media"><div class="overlay">${item}</div>`;
                }
                grid.appendChild(card);
            });
        }

        async function pollStatus() {
            try {
                const response = await fetch('/api/status');
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'running') {
                        statusBadge.innerText = 'STATUS: RUNNING [' + data.current_keyword + ']';
                        statusBadge.classList.add('running');
                        btnRun.disabled = true;
                        btnRun.innerText = '[SCRAPE_IN_PROGRESS]';

                        terminalWrapper.style.display = 'flex';
                        pollLogs();
                    } else {
                        statusBadge.innerText = 'STATUS: IDLE';
                        statusBadge.classList.remove('running');
                        btnRun.disabled = false;
                        btnRun.innerText = '[INITIATE_SCRAPE]';
                        logOffset = 0; // reset for next run

                        // We are IDLE, good time to refresh the dashboard
                        fetchDashboard();
                    }
                }
            } catch (err) {
                console.error("Status polling failed:", err);
            }
        }

        async function pollLogs() {
            try {
                const response = await fetch('/api/logs?offset=' + logOffset);
                if (response.ok) {
                    const data = await response.json();
                    if (data.lines && data.lines.length > 0) {
                        data.lines.forEach(line => {
                            const div = document.createElement('div');
                            div.textContent = line;
                            terminalBody.appendChild(div);
                        });
                        logOffset = data.next_offset;
                        terminalBody.scrollTop = terminalBody.scrollHeight;
                    }
                }
            } catch (err) {
                console.error("Log polling failed:", err);
            }
        }

        // Initial Fetch
        fetchDashboard();
    </script>
</body>

</html>
