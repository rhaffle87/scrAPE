<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRAPE // VAULT</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0d0c;
            --bg-surface: #161917;
            --accent: #ff5500;
            --accent-dim: rgba(255, 85, 0, 0.2);
            --text-primary: #f4f4f0;
            --text-muted: #8c928e;
            --border-heavy: 2px solid #3a3f3c;
            --border-accent: 2px solid var(--accent);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0 !important; /* Brutalism: no curves */
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        header {
            background-color: var(--bg-base);
            padding: 2rem;
            border-bottom: var(--border-heavy);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            line-height: 1;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            border-bottom: 1px solid var(--accent);
        }

        .controls-container {
            max-width: 1400px;
            margin: 2rem auto;
            width: 100%;
            padding: 0 2rem;
        }

        .glass-panel {
            background-color: var(--bg-surface);
            border: var(--border-heavy);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-form {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        input, select {
            background-color: var(--bg-base);
            border: var(--border-heavy);
            color: var(--text-primary);
            padding: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 4px 4px 0 var(--accent-dim);
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg-base);
            border: 2px solid var(--accent);
            padding: 0.75rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            height: 48px;
            margin-top: auto;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--text-primary);
        }

        /* Tabs styling */
        .gallery-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            font-family: 'JetBrains Mono', monospace;
            background-color: transparent;
            border: var(--border-heavy);
            color: var(--text-muted);
            padding: 0.5rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background-color: var(--bg-surface);
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1400px;
            margin: 2rem auto;
            width: 100%;
            padding: 0 2rem;
            flex: 1;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .media-card {
            background-color: var(--bg-surface);
            border: var(--border-heavy);
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
        }

        .media-card:hover {
            border-color: var(--accent);
            transform: translate(-4px, -4px);
            box-shadow: 6px 6px 0 var(--accent);
        }

        .media-card img, .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0s;
        }

        .media-card:hover img, .media-card:hover video {
            filter: grayscale(0%) contrast(1);
        }

        /* Suppress IDM (Internet Download Manager) download button overlay.
           IDM works by injecting <img> nodes sourced from its own browser
           extension URL (chrome-extension:// or moz-extension://) directly
           into the page DOM. Hiding those by src prefix covers any injections
           that land before the MutationObserver fires. */
        img[src^="chrome-extension://"],
        img[src^="moz-extension://"],
        img[src^="safari-extension://"] {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        .media-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--accent);
            padding: 0.5rem;
            color: var(--bg-base);
            font-weight: 700;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0s;
            pointer-events: none;
            height: 100%;
            z-index: 2;
        }

        .media-card:hover .overlay {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-overlay {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: var(--border-heavy);
            background-color: var(--bg-surface);
            color: var(--text-primary);
            cursor: pointer;
        }

        .btn-overlay:hover {
            background-color: var(--bg-base);
            color: var(--accent);
        }

        .btn-overlay.delete {
            background-color: #ff3333;
            color: white;
            border-color: #ff3333;
        }

        .btn-overlay.delete:hover {
            background-color: black;
            color: red;
            border-color: black;
        }

        .media-filename {
            font-size: 0.75rem;
            color: var(--bg-base);
            word-break: break-all;
            line-height: 1.4;
        }

        /* HTMX Indicator */
        .htmx-indicator {
            display: none;
            text-align: center;
            padding: 2rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            grid-column: 1 / -1;
            animation: pulse 1s infinite;
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>SCRAPE // VAULT</h1>
        </div>
        <a href="/" class="nav-link">← Command Center</a>
    </header>

    <div class="controls-container">
        <div class="glass-panel">
            <h2>MEDIA VAULT
                <div class="gallery-tabs">
                    <button class="tab-btn active" data-kind="all" onclick="switchTab('all')">ALL</button>
                    <button class="tab-btn" data-kind="images" onclick="switchTab('images')">IMAGES</button>
                    <button class="tab-btn" data-kind="videos" onclick="switchTab('videos')">VIDEOS</button>
                </div>
            </h2>
            <form class="controls-row" onsubmit="event.preventDefault(); triggerLoad();">
                <div class="form-group">
                    <label>Keyword</label>
                    <input type="text" id="keyword-input" placeholder="keyword" value="apple">
                </div>
                <div class="form-group">
                    <label>Domain</label>
                    <input type="text" id="domain-input" placeholder="domain.com">
                </div>
                <button type="submit" class="btn" style="margin-top: auto;">Filter</button>
            </form>
        </div>
    </div>

    <div class="gallery-container">
        <div class="htmx-indicator" id="loader-indicator">LOADING MEDIA SECTOR...</div>
        <div class="gallery-grid" id="gallery-grid-container">
            <!-- HTMX-loaded items -->
        </div>
    </div>

    <script>
        let currentMediaKind = "all";

        function getKeyword() {
            return document.getElementById('keyword-input').value.trim() || "apple";
        }

        function getDomain() {
            return document.getElementById('domain-input').value.trim();
        }

        function switchTab(kind) {
            currentMediaKind = kind;
            document.querySelectorAll('.gallery-tabs .tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-kind') === kind) {
                    btn.classList.add('active');
                }
            });
            triggerLoad();
        }

        function triggerLoad() {
            const grid = document.getElementById('gallery-grid-container');
            const kw = getKeyword();
            const dom = getDomain();
            
            grid.setAttribute('hx-get', `/htmx/gallery?keyword=${kw}&domain=${dom}&media_kind=${currentMediaKind}`);
            grid.setAttribute('hx-indicator', '#loader-indicator');
            
            htmx.process(grid);
            htmx.trigger(grid, 'load');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const kwParam = urlParams.get('keyword');
            if (kwParam) {
                document.getElementById('keyword-input').value = kwParam;
            }
            triggerLoad();
        });
        // Remove IDM-injected download overlay nodes as soon as they appear.
        // IDM's browser extension appends <img> elements whose src begins with
        // a browser extension URL directly into the page body or card elements.
        // This observer catches those insertions immediately and removes them,
        // covering HTMX-rendered cards that load after DOMContentLoaded.
        (function suppressIDMIcons() {
            const isIDMNode = (node) => {
                if (node.nodeType !== 1) return false;
                const src = node.getAttribute('src') || '';
                return (
                    src.startsWith('chrome-extension://') ||
                    src.startsWith('moz-extension://') ||
                    src.startsWith('safari-extension://')
                );
            };

            const purge = (root) => {
                root.querySelectorAll(
                    'img[src^="chrome-extension://"], img[src^="moz-extension://"], img[src^="safari-extension://"]'
                ).forEach(el => el.remove());
            };

            const observer = new MutationObserver((mutations) => {
                for (const m of mutations) {
                    for (const node of m.addedNodes) {
                        if (isIDMNode(node)) {
                            node.remove();
                        } else if (node.nodeType === 1) {
                            purge(node);
                        }
                    }
                }
            });

            document.addEventListener('DOMContentLoaded', () => {
                observer.observe(document.body, { childList: true, subtree: true });
                purge(document.body);
            });
        })();
    </script>
</body>
</html>
