<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" style="background: #0b0d0c;">
  <!-- Brutalist Hard Block Shadow Background -->
  <rect x="26" y="26" width="160" height="160" fill="#ff5500" />
  
  <!-- Primary Card Surface -->
  <rect x="20" y="20" width="160" height="160" fill="#161917" stroke="#3a3f3c" stroke-width="4" />
  
  <!-- Scraper Code Brackets (Outer Framing) -->
  <!-- Left Bracket '<' -->
  <path d="M 40 70 L 28 100 L 40 130" stroke="#8c928e" stroke-width="4" fill="none" stroke-linejoin="miter" />
  <!-- Right Bracket '>' -->
  <path d="M 160 70 L 172 100 L 160 130" stroke="#8c928e" stroke-width="4" fill="none" stroke-linejoin="miter" />

  <!-- Brutalist Geometric APE Mask / Head -->
  <g id="ape-geometry">
    <!-- Brow Ridge (Heavy Top Bar) -->
    <rect x="52" y="60" width="96" height="16" fill="#f4f4f0" />
    
    <!-- Deep Eye Sockets (Cutouts using Base Obsidian Dark) -->
    <rect x="62" y="80" width="28" height="20" fill="#0b0d0c" />
    <rect x="110" y="80" width="28" height="20" fill="#0b0d0c" />
    
    <!-- Target / Scraped Pupil Nodes (Acquisition Orange) -->
    <rect x="72" y="86" width="8" height="8" fill="#ff5500" />
    <rect x="120" y="86" width="8" height="8" fill="#ff5500" />
    
    <!-- Bridge / Mid-face Section -->
    <rect x="94" y="80" width="12" height="24" fill="#f4f4f0" />
    
    <!-- Heavy Muzzle / Jaw (Prominent Ape Feature) -->
    <rect x="60" y="108" width="80" height="28" fill="#ff5500" />
    
    <!-- Raw Data Nostril Slots -->
    <rect x="88" y="114" width="8" height="12" fill="#0b0d0c" />
    <rect x="104" y="114" width="8" height="12" fill="#0b0d0c" />
    
    <!-- Teeth / Grille (Representing Telemetry / Binary Inputs) -->
    <rect x="68" y="128" width="6" height="8" fill="#f4f4f0" />
    <rect x="80" y="128" width="6" height="8" fill="#f4f4f0" />
    <rect x="92" y="128" width="16" height="8" fill="#0b0d0c" />
    <rect x="114" y="128" width="6" height="8" fill="#f4f4f0" />
    <rect x="126" y="128" width="6" height="8" fill="#f4f4f0" />
  </g>

  <!-- Technical Telemetry Corner Accents -->
  <rect x="26" y="26" width="6" height="6" fill="#ff5500" />
  <rect x="168" y="26" width="6" height="6" fill="#3a3f3c" />
  <rect x="26" y="168" width="6" height="6" fill="#3a3f3c" />
  <rect x="168" y="168" width="6" height="6" fill="#ff5500" />
</svg>
