<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRAPE // WATCHDOG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0d0c;
            --bg-surface: #161917;
            --accent: #ff5500;
            --accent-dim: rgba(255, 85, 0, 0.2);
            --text-primary: #f4f4f0;
            --text-muted: #8c928e;
            --border-heavy: 2px solid #3a3f3c;
            --border-accent: 2px solid var(--accent);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border-radius: 0 !important; /* Brutalism: no curves */
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            position: relative;
            min-height: 100vh;
        }

        /* SVG Noise Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        header {
            background-color: var(--bg-base);
            padding: 2rem;
            border-bottom: var(--border-heavy);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            line-height: 1;
        }

        .header-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stat-card {
            background-color: var(--bg-surface);
            padding: 1.5rem;
            border: var(--border-heavy);
            display: flex;
            flex-direction: column;
            transition: all 0s; /* No smooth transitions */
            position: relative;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 10px; height: 10px;
            background-color: var(--accent);
            opacity: 0;
        }

        .stat-card:hover {
            border-color: var(--accent);
            background-color: var(--accent-dim);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .stat-card .value {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 2rem;
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            border-bottom: var(--border-heavy);
        }

        .tab {
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem 2rem;
            background-color: transparent;
            border: none;
            border-right: var(--border-heavy);
            border-top: var(--border-heavy);
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
        }
        
        .tab:first-child {
            border-left: var(--border-heavy);
        }

        .tab:hover {
            color: var(--text-primary);
            background-color: var(--bg-surface);
        }

        .tab.active {
            background-color: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .gallery-container {
            padding: 0 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-container h2 {
            font-family: 'Oswald', sans-serif;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .media-card {
            background-color: var(--bg-surface);
            position: relative;
            aspect-ratio: 1;
            border: var(--border-heavy);
            overflow: hidden;
        }

        .media-card:hover {
            border-color: var(--accent);
        }

        .media-card img,
        .media-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(1.2);
            transition: filter 0s;
        }

        .media-card:hover img,
        .media-card:hover video {
            filter: grayscale(0%) contrast(1);
        }

        .media-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--accent);
            padding: 0.5rem;
            font-size: 0.75rem;
            color: var(--bg-base);
            font-weight: 700;
            opacity: 0;
        }

        .media-card:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>scrAPE // WATCHDOG</h1>
            <div class="header-sub">Data Extraction Engine</div>
        </div>
        <div class="header-sub" id="last-updated">SYS.UPDATE: 2026-07-17 13:21:48</div>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <div class="label">EXTRACT.RUNS</div>
            <div class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">ASSET.IMG</div>
            <div class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">ASSET.VID</div>
            <div class="value">0</div>
        </div>
        <div class="stat-card">
            <div class="label">TARGETS.SCAN</div>
            <div class="value">0</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('images', this)">IMG_LOG</button>
        <button class="tab" onclick="showTab('videos', this)">VID_LOG</button>
    </div>

    <div class="gallery-container" id="images-tab">
        <h2>[ ACQUIRED IMAGES ]</h2>
        <div class="grid">
            <p>No images found yet.</p>
        </div>
    </div>

    <div class="gallery-container" id="videos-tab" style="display: none;">
        <h2>[ ACQUIRED VIDEOS ]</h2>
        <div class="grid">
            <p>No videos found yet.</p>
        </div>
    </div>

    <script>
        function showTab(tabName, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.gallery-container').forEach(c => c.style.display = 'none');

            document.getElementById(tabName + '-tab').style.display = 'block';
            btn.classList.add('active');
        }
    </script>
</body>
</html>
